<!doctype html>
<html>
  <head>
    <title>Employee Details</title>
    <link rel="stylesheet" href="singleentry.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body>
    <div class="head">
      <h2>Welcome Employees's PVC</h2>
    </div>
    <div class="empdetails">
      <div class="empcolumn">
        <label>Employee Name</label>
        <input type="text" />
      </div>
      <div class="empcolumn">
        <label>Employee ID</label>
        <input type="text" />
      </div>
      <div class="empcolumn">
        <label>Designation</label>
        <input type="text" />
      </div>
      <div class="empcolumn">
        <label>Employee Department</label>
        <input type="text" />
      </div>
      <button id="save" onclick="generateid()">generate ID</button>
      <button id="clear" onclick="reset()">Reset</button>
    </div>
    <button id="print" onclick="window.print()">Print</button>
    <div class="idtemplate" id="idtemplate">
      <h2>Company ID card- Boutiqaat</h2>
      <div class="empdata">
        <img class="bgimage" src="backgroundimage.jpeg" />
        <div class="textgroup">
          <div class="empdatacolumn">
            <label>Employee Name </label>
            <label id="empname"></label>
          </div>
          <div class="empdatacolumn">
            <lable>Employee ID </lable>
            <label id="empid"></label>
          </div>
          <div class="empdatacolumn">
            <lable>Designation </lable>
            <label id="empdesignation"></label>
          </div>
          <div class="empdatacolumn">
            <label>Department </label>
            <lable id="department"></lable>
          </div>
        </div>
        <div class="qrcontainer">
          <div class="qr" id="qr"></div>
        </div>
      </div>
    </div>
    <script src="singleentry.js"></script>
 </body>
</html>
